<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Arena - Árbitro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>👨‍🏫 Painel do Árbitro</h1>
    <p>Controle da sessão local</p>
</header>

<main>

    <section class="card">
        <h2>Sessão</h2>
        <p><strong>Código:</strong> GP-TESTE</p>
        <p><strong>Rodada atual:</strong> <span id="rodadaAtual">1</span></p>

        <div class="barra">
            <div id="barraProgresso"></div>
        </div>
    </section>

    <section class="card">
        <h2>Controle</h2>
        <button id="btnLiberar">🚀 Liberar Desafio</button>
        <button id="btnEncerrar">🏁 Encerrar Rodada</button>
        <button id="btnReiniciar">🔄 Reiniciar Sessão</button>
    </section>

    <section class="card">
        <h2>Desafio Atual</h2>
        <div id="desafio">Nenhum desafio liberado.</div>
    </section>

    <section class="card">
        <h2>Ranking</h2>
        <div id="ranking"></div>
    </section>

    <section class="card">
        <h2>Observações do Árbitro</h2>
        <textarea rows="6" placeholder="Anotações da rodada..."></textarea>
    </section>

</main>

<footer>
    Project Arena - Árbitro
</footer>

<script src="js/equipes.js"></script>
<script src="js/desafios.js"></script>
<script src="js/app.js"></script>

</body>
</html>
