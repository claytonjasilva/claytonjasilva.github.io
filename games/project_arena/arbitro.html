<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project Arena - Árbitro</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

    <h1>👨‍🏫 Painel do Árbitro</h1>

    <p>Versão 1.0 - Sessão Local</p>

</header>

<main>

<section class="card">

    <h2>Configuração da Sessão</h2>

    <label>Sessão</label><br>

    <input
        type="text"
        id="sessao"
        value="GP-TESTE"
        readonly>

    <br><br>

    <label>Equipe</label><br>

    <input
        type="text"
        id="equipe"
        value="Alpha"
        readonly>

</section>

<section class="card">

<h2>Controle da Rodada</h2>

<button id="btnLiberar">

🚀 Liberar Desafio

</button>

<button id="btnEncerrar">

🏁 Encerrar Rodada

</button>

<button id="btnReiniciar">

🔄 Reiniciar Sessão

</button>

</section>

<section class="card">

<h2>Desafio Atual</h2>

<div id="desafio">

Nenhum desafio liberado.

</div>

</section>

<section class="card">

<h2>Status da Equipe</h2>

<table>

<tr>

<td>Equipe</td>

<td id="nomeEquipe">

Alpha

</td>

</tr>

<tr>

<td>Status</td>

<td id="statusEquipe">

Aguardando

</td>

</tr>

<tr>

<td>Pontuação</td>

<td id="pontuacao">

0

</td>

</tr>

<tr>

<td>XP</td>

<td id="xp">

0

</td>

</tr>

</table>

</section>

<section class="card">

<h2>Observações do Árbitro</h2>

<textarea
rows="8"
placeholder="Anotações da rodada...">

</textarea>

</section>

</main>

<footer>

Project Arena - Painel do Árbitro

</footer>

<script src="js/desafios.js"></script>

<script src="js/app.js"></script>

</body>

</html>
