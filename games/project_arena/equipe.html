<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Arena - Equipe</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>👥 Painel da Equipe</h1>
    <p>Project Arena - Gestão de Projetos</p>
</header>

<main>

    <section class="card">
        <h2>Identificação</h2>

        <label for="equipeSelecionada">Equipe</label>
        <select id="equipeSelecionada">
            <option value="alpha">Equipe Alpha</option>
            <option value="beta">Equipe Beta</option>
            <option value="gama">Equipe Gama</option>
        </select>

        <p><strong>Status:</strong> <span id="statusEquipe">Aguardando desafio...</span></p>
    </section>

    <section class="card">
        <h2>Desafio Atual</h2>
        <div id="desafio">O desafio ainda não foi liberado pelo árbitro.</div>
    </section>

    <section class="card">
        <h2>Resposta</h2>

        <label><input type="radio" name="resp" value="A"> A</label><br>
        <label><input type="radio" name="resp" value="B"> B</label><br>
        <label><input type="radio" name="resp" value="C"> C</label><br>
        <label><input type="radio" name="resp" value="D"> D</label><br><br>

        <button id="btnEnviar">Enviar Resposta</button>
    </section>

    <section class="card">
        <h2>Resultado</h2>
        <div id="resultado">Aguardando resposta...</div>
    </section>

    <section class="card">
        <h2>Desempenho da Equipe</h2>
        <table>
            <tr>
                <td>Pontos</td>
                <td id="pontos">0</td>
            </tr>
            <tr>
                <td>XP</td>
                <td id="xp">0</td>
            </tr>
            <tr>
                <td>Nível</td>
                <td id="nivel">Estagiário</td>
            </tr>
        </table>
    </section>

</main>

<footer>
    Project Arena © 2026
</footer>

<script src="js/equipes.js"></script>
<script src="js/desafios.js"></script>
<script src="js/app.js"></script>

</body>
</html>
