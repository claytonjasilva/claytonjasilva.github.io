  <!-- título -->
  <text x="260" y="20" fill="#00c2ff" font-size="11" text-anchor="middle" font-weight="600">Elementos nulo e neutro da disjunção</text>
  <text x="145" y="36" fill="#64748b" font-size="10" text-anchor="middle">Elemento nulo: A + 1 = 1</text>
  <text x="375" y="36" fill="#64748b" font-size="10" text-anchor="middle">Elemento neutro: A + 0 = A</text>

