<svg viewBox="0 0 560 210" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace" font-size="11">
  <rect width="560" height="210" fill="#0a0e17" rx="8"/>
  <!-- níveis de quantização -->
  <line x1="60" y1="45"  x2="520" y2="45"  stroke="#1e2d40" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="60" y1="75"  x2="520" y2="75"  stroke="#1e2d40" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="60" y1="105" x2="520" y2="105" stroke="#1e2d40" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="60" y1="135" x2="520" y2="135" stroke="#1e2d40" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="60" y1="165" x2="520" y2="165" stroke="#1e2d40" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- eixos -->
  <line x1="60" y1="20"  x2="60"  y2="178" stroke="#64748b" stroke-width="1.5"/>
  <line x1="55" y1="173" x2="525" y2="173" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="525,173 518,169 518,177" fill="#64748b"/>
  <polygon points="60,20 56,27 64,27" fill="#64748b"/>
  <text x="530" y="177" fill="#64748b" font-size="12" font-style="italic">t</text>
  <text x="52"  y="17"  fill="#64748b" font-size="12" font-style="italic">x</text>
  <!-- curva analógica de referência (tracejada) -->
  <path d="M60,105 C90,105 100,45 130,45 C160,45 170,165 200,165 C230,165 240,45 270,45 C300,45 310,165 340,165 C370,165 380,45 410,45 C440,45 450,165 480,165 C500,165 510,125 520,105"
        fill="none" stroke="#1e2d40" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- sinal quantizado (escada) -->
  <polyline points="60,105 90,105 90,75 130,75 130,45 160,45 160,105 190,105 190,165 220,165 220,135 250,135 250,75 280,75 280,45 310,45 310,75 340,75 340,135 370,135 370,165 400,165 400,105 430,105 430,45 460,45 460,75 490,75 490,105 520,105"
        fill="none" stroke="#00c2ff" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- degrau de quantização -->
  <line x1="44" y1="45" x2="44" y2="75" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="40" y1="45" x2="48" y2="45" stroke="#7c3aed" stroke-width="1"/>
  <line x1="40" y1="75" x2="48" y2="75" stroke="#7c3aed" stroke-width="1"/>
  <text x="5" y="63" fill="#7c3aed" font-size="9">Δ</text>
  <!-- labels níveis -->
  <text x="28" y="49"  fill="#64748b" font-size="9">N-1</text>
  <text x="28" y="79"  fill="#64748b" font-size="9">N-2</text>
  <text x="34" y="109" fill="#64748b" font-size="9">…</text>
  <text x="34" y="139" fill="#64748b" font-size="9">1</text>
  <text x="34" y="169" fill="#64748b" font-size="9">0</text>
  <text x="370" y="40" fill="#00c2ff" font-size="11">x_Q(t)</text>
  <text x="280" y="205" fill="#64748b" font-size="10" text-anchor="middle">Sinal quantizado — discreto em amplitude, contínuo no tempo</text>
</svg>
