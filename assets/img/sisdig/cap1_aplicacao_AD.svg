<svg viewBox="0 0 580 160" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace" font-size="11">
  <rect width="580" height="160" fill="#0a0e17" rx="8"/>

  <!-- Bloco 1: Microfone / Fonte analógica -->
  <rect x="20" y="50" width="100" height="60" rx="6" fill="#111827" stroke="#1e2d40" stroke-width="1.5"/>
  <text x="70" y="76" fill="#e2e8f0" font-size="10" text-anchor="middle" font-weight="600">Fonte</text>
  <text x="70" y="91" fill="#64748b" font-size="9" text-anchor="middle">Sinal analógico</text>
  <text x="70" y="104" fill="#64748b" font-size="9" text-anchor="middle">(microfone)</text>

  <!-- seta 1 -->
  <line x1="120" y1="80" x2="148" y2="80" stroke="#00c2ff" stroke-width="1.5"/>
  <polygon points="148,80 142,76 142,84" fill="#00c2ff"/>
  <!-- mini sinal analógico acima da seta -->
  <path d="M124,72 C127,72 128,66 131,66 C134,66 135,74 138,74 C141,74 142,68 145,68" fill="none" stroke="#00c2ff" stroke-width="1.2"/>

  <!-- Bloco 2: ADC -->
  <rect x="150" y="40" width="110" height="80" rx="6" fill="#111827" stroke="#00c2ff" stroke-width="1.5"/>
  <text x="205" y="68" fill="#00c2ff" font-size="10" text-anchor="middle" font-weight="600">Conversor A/D</text>
  <text x="205" y="84" fill="#64748b" font-size="9" text-anchor="middle">Amostragem</text>
  <text x="205" y="97" fill="#64748b" font-size="9" text-anchor="middle">Quantização</text>
  <text x="205" y="110" fill="#64748b" font-size="9" text-anchor="middle">Codificação</text>

  <!-- seta 2 -->
  <line x1="260" y1="80" x2="288" y2="80" stroke="#00c2ff" stroke-width="1.5"/>
  <polygon points="288,80 282,76 282,84" fill="#00c2ff"/>
  <!-- mini sinal digital acima da seta -->
  <polyline points="263,74 263,66 268,66 268,74 273,74 273,66 278,66 278,74 283,74 283,66 288,66" fill="none" stroke="#00c2ff" stroke-width="1.2" stroke-linecap="square"/>

  <!-- Bloco 3: Processamento -->
  <rect x="290" y="50" width="110" height="60" rx="6" fill="#111827" stroke="#1e2d40" stroke-width="1.5"/>
  <text x="345" y="76" fill="#e2e8f0" font-size="10" text-anchor="middle" font-weight="600">Processamento</text>
  <text x="345" y="91" fill="#64748b" font-size="9" text-anchor="middle">Compressão</text>
  <text x="345" y="104" fill="#64748b" font-size="9" text-anchor="middle">(ex: MP3)</text>

  <!-- seta 3 -->
  <line x1="400" y1="80" x2="428" y2="80" stroke="#00c2ff" stroke-width="1.5"/>
  <polygon points="428,80 422,76 422,84" fill="#00c2ff"/>

  <!-- Bloco 4: Armazenamento -->
  <rect x="430" y="50" width="110" height="60" rx="6" fill="#111827" stroke="#1e2d40" stroke-width="1.5"/>
  <text x="485" y="76" fill="#e2e8f0" font-size="10" text-anchor="middle" font-weight="600">Armazenamento</text>
  <text x="485" y="91" fill="#64748b" font-size="9" text-anchor="middle">Arquivo digital</text>
  <text x="485" y="104" fill="#64748b" font-size="9" text-anchor="middle">(disco / nuvem)</text>

  <!-- título -->
  <text x="290" y="150" fill="#64748b" font-size="10" text-anchor="middle">Aplicação típica: gravação e armazenamento de áudio</text>
</svg>
