<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace" font-size="11">
  <!-- fundo -->
  <rect width="560" height="200" fill="#0a0e17" rx="8"/>
  <!-- grade horizontal -->
  <line x1="60" y1="40"  x2="520" y2="40"  stroke="#1e2d40" stroke-width="1"/>
  <line x1="60" y1="100" x2="520" y2="100" stroke="#1e2d40" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="160" x2="520" y2="160" stroke="#1e2d40" stroke-width="1"/>
  <!-- eixos -->
  <line x1="60" y1="20" x2="60" y2="175" stroke="#64748b" stroke-width="1.5"/>
  <line x1="55" y1="170" x2="525" y2="170" stroke="#64748b" stroke-width="1.5"/>
  <!-- seta eixo x -->
  <polygon points="525,170 518,166 518,174" fill="#64748b"/>
  <!-- seta eixo y -->
  <polygon points="60,20 56,27 64,27" fill="#64748b"/>
  <!-- labels eixos -->
  <text x="530" y="174" fill="#64748b" font-size="12" font-style="italic">t</text>
  <text x="52" y="17"  fill="#64748b" font-size="12" font-style="italic">x</text>
  <!-- curva senoidal suave -->
  <path d="M60,100 C90,100 100,40 130,40 C160,40 170,160 200,160 C230,160 240,40 270,40 C300,40 310,160 340,160 C370,160 380,40 410,40 C440,40 450,160 480,160 C500,160 510,120 520,100"
        fill="none" stroke="#00c2ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- label curva -->
  <text x="390" y="35" fill="#00c2ff" font-size="11">x(t)</text>
  <!-- labels amplitude -->
  <text x="30" y="44"  fill="#64748b" font-size="10">x₁</text>
  <text x="30" y="104" fill="#64748b" font-size="10">0</text>
  <text x="30" y="164" fill="#64748b" font-size="10">x₀</text>
  <!-- título -->
  <text x="280" y="195" fill="#64748b" font-size="10" text-anchor="middle">Sinal analógico — contínuo em amplitude e no tempo</text>
</svg>
