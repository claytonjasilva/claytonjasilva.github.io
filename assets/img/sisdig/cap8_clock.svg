<svg viewBox="0 0 560 220" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace" font-size="11">
  <rect width="560" height="220" fill="#0a0e17" rx="8"/>
  <text x="280" y="20" fill="#00c2ff" font-size="11" text-anchor="middle" font-weight="600">Sinal de clock — trem de ondas quadradas</text>

  <!-- eixos -->
  <line x1="60" y1="40"  x2="60"  y2="160" stroke="#64748b" stroke-width="1.3"/>
  <line x1="55" y1="155" x2="520" y2="155" stroke="#64748b" stroke-width="1.3"/>
  <polygon points="520,155 513,151 513,159" fill="#64748b"/>
  <polygon points="60,40 56,47 64,47" fill="#64748b"/>
  <text x="525" y="159" fill="#64748b" font-size="11" font-style="italic">t</text>
  <text x="52"  y="37"  fill="#64748b" font-size="11" font-style="italic">V</text>

  <!-- níveis de referência -->
  <line x1="60" y1="65"  x2="500" y2="65"  stroke="#1e2d40" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="60" y1="125" x2="500" y2="125" stroke="#1e2d40" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="32" y="69"  fill="#64748b" font-size="9">V_H</text>
  <text x="32" y="129" fill="#64748b" font-size="9">V_L</text>

  <!-- onda quadrada periódica: 3 ciclos completos -->
  <polyline points="80,125 80,65 160,65 160,125 240,125 240,65 320,65 320,125 400,125 400,65 480,65 480,125"
    fill="none" stroke="#00c2ff" stroke-width="2.2" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- fill sob nível alto -->
  <rect x="80"  y="65" width="80" height="60" fill="rgba(0,194,255,0.06)"/>
  <rect x="240" y="65" width="80" height="60" fill="rgba(0,194,255,0.06)"/>
  <rect x="400" y="65" width="80" height="60" fill="rgba(0,194,255,0.06)"/>

  <!-- destaque borda de subida (rising edge) -->
  <line x1="80" y1="65" x2="80" y2="125" stroke="#7c3aed" stroke-width="2.5"/>
  <circle cx="80" cy="65" r="3" fill="#7c3aed"/>
  <text x="80" y="175" fill="#7c3aed" font-size="9" text-anchor="middle">borda de</text>
  <text x="80" y="187" fill="#7c3aed" font-size="9" text-anchor="middle">subida</text>

  <!-- destaque borda de descida (falling edge) -->
  <line x1="160" y1="65" x2="160" y2="125" stroke="#7c3aed" stroke-width="2.5" opacity="0.6"/>
  <circle cx="160" cy="125" r="3" fill="#7c3aed" opacity="0.6"/>
  <text x="160" y="175" fill="#7c3aed" font-size="9" text-anchor="middle" opacity="0.7">borda de</text>
  <text x="160" y="187" fill="#7c3aed" font-size="9" text-anchor="middle" opacity="0.7">descida</text>

  <!-- período Tck -->
  <line x1="80"  y1="200" x2="240" y2="200" stroke="#64748b" stroke-width="1"/>
  <line x1="80"  y1="195" x2="80"  y2="205" stroke="#64748b" stroke-width="1"/>
  <line x1="240" y1="195" x2="240" y2="205" stroke="#64748b" stroke-width="1"/>
  <text x="160" y="213" fill="#64748b" font-size="10" text-anchor="middle">T_Ck (período)</text>

  <!-- Ton -->
  <line x1="80" y1="45" x2="160" y2="45" stroke="#00c2ff" stroke-width="1" opacity="0.6"/>
  <line x1="80" y1="40" x2="80" y2="50" stroke="#00c2ff" stroke-width="1" opacity="0.6"/>
  <line x1="160" y1="40" x2="160" y2="50" stroke="#00c2ff" stroke-width="1" opacity="0.6"/>
  <text x="120" y="35" fill="#64748b" font-size="9" text-anchor="middle">T_on</text>

  <!-- legenda equações -->
  <text x="280" y="60" fill="#64748b" font-size="9" text-anchor="middle"></text>
</svg>
