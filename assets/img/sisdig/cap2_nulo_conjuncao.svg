<svg viewBox="0 0 480 130" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace" font-size="11">
  <rect width="480" height="130" fill="#0a0e17" rx="8"/>

  <!-- Elemento NULO: A.0 = 0 -->
  <text x="30" y="20" fill="#64748b" font-size="10">Elemento nulo: A · 0 = 0</text>
  <line x1="20" y1="55" x2="75" y2="55" stroke="#00c2ff" stroke-width="1.5"/>
  <line x1="20" y1="75" x2="75" y2="75" stroke="#00c2ff" stroke-width="1.5"/>
  <text x="8"  y="59" fill="#e2e8f0" font-size="12" font-style="italic">A</text>
  <text x="8"  y="79" fill="#64748b" font-size="12">0</text>
  <rect x="75" y="44" width="36" height="42" fill="none" stroke="#00c2ff" stroke-width="1.8"/>
  <path d="M111,44 A21,21 0 0,1 111,86" fill="none" stroke="#00c2ff" stroke-width="1.8"/>
  <line x1="131" y1="65" x2="170" y2="65" stroke="#00c2ff" stroke-width="1.5"/>
  <text x="173" y="69" fill="#7c3aed" font-size="13" font-weight="600">= 0</text>
  <text x="93" y="105" fill="#64748b" font-size="10" text-anchor="middle">A · 0 = 0</text>

  <!-- Elemento NEUTRO: A.1 = A -->
  <text x="270" y="20" fill="#64748b" font-size="10">Elemento neutro: A · 1 = A</text>
  <line x1="260" y1="55" x2="315" y2="55" stroke="#00c2ff" stroke-width="1.5"/>
  <line x1="260" y1="75" x2="315" y2="75" stroke="#00c2ff" stroke-width="1.5"/>
  <text x="248" y="59" fill="#e2e8f0" font-size="12" font-style="italic">A</text>
  <text x="248" y="79" fill="#64748b" font-size="12">1</text>
  <rect x="315" y="44" width="36" height="42" fill="none" stroke="#00c2ff" stroke-width="1.8"/>
  <path d="M351,44 A21,21 0 0,1 351,86" fill="none" stroke="#00c2ff" stroke-width="1.8"/>
  <line x1="371" y1="65" x2="410" y2="65" stroke="#00c2ff" stroke-width="1.5"/>
  <text x="413" y="69" fill="#00c2ff" font-size="13" font-weight="600" font-style="italic">= A</text>
  <text x="333" y="105" fill="#64748b" font-size="10" text-anchor="middle">A · 1 = A</text>
</svg>
