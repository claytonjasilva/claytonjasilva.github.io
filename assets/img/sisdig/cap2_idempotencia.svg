<svg viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace" font-size="11">
  <rect width="480" height="120" fill="#0a0e17" rx="8"/>

  <!-- Idempotência AND: A.A = A -->
  <text x="20" y="18" fill="#64748b" font-size="10">Idempotência da conjunção: A · A = A</text>
  <line x1="20" y1="48" x2="75" y2="48" stroke="#00c2ff" stroke-width="1.5"/>
  <line x1="45" y1="48" x2="45" y2="68" stroke="#00c2ff" stroke-width="1.5"/>
  <line x1="45" y1="68" x2="75" y2="68" stroke="#00c2ff" stroke-width="1.5"/>
  <text x="8" y="52" fill="#e2e8f0" font-size="12" font-style="italic">A</text>
  <text x="8" y="72" fill="#e2e8f0" font-size="12" font-style="italic">A</text>
  <rect x="75" y="38" width="34" height="40" fill="none" stroke="#00c2ff" stroke-width="1.8"/>
  <path d="M109,38 A20,20 0 0,1 109,78" fill="none" stroke="#00c2ff" stroke-width="1.8"/>
  <line x1="129" y1="58" x2="165" y2="58" stroke="#00c2ff" stroke-width="1.5"/>
  <text x="168" y="62" fill="#00c2ff" font-size="13" font-weight="600" font-style="italic">= A</text>
  <text x="95" y="100" fill="#64748b" font-size="10" text-anchor="middle">A · A = A</text>

  <!-- Idempotência OR: A+A = A -->
  <text x="260" y="18" fill="#64748b" font-size="10">Idempotência da disjunção: A + A = A</text>
  <line x1="255" y1="48" x2="310" y2="48" stroke="#00c2ff" stroke-width="1.5"/>
  <line x1="280" y1="48" x2="280" y2="68" stroke="#00c2ff" stroke-width="1.5"/>
  <line x1="280" y1="68" x2="310" y2="68" stroke="#00c2ff" stroke-width="1.5"/>
  <text x="243" y="52" fill="#e2e8f0" font-size="12" font-style="italic">A</text>
  <text x="243" y="72" fill="#e2e8f0" font-size="12" font-style="italic">A</text>
  <path d="M310,37 Q327,58 310,79 Q343,79 363,58 Q343,37 310,37 Z" fill="none" stroke="#00c2ff" stroke-width="1.8"/>
  <path d="M310,37 Q322,58 310,79" fill="none" stroke="#0a0e17" stroke-width="3.5"/>
  <path d="M310,37 Q321,58 310,79" fill="none" stroke="#00c2ff" stroke-width="1.8"/>
  <line x1="363" y1="58" x2="400" y2="58" stroke="#00c2ff" stroke-width="1.5"/>
  <text x="403" y="62" fill="#00c2ff" font-size="13" font-weight="600" font-style="italic">= A</text>
  <text x="335" y="100" fill="#64748b" font-size="10" text-anchor="middle">A + A = A</text>
</svg>
