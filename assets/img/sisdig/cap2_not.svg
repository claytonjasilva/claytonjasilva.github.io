<svg viewBox="0 0 420 140" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="IBM Plex Mono, monospace" font-size="12">
  <rect width="420" height="140" fill="#0a0e17" rx="8"/>

  <!-- SÍMBOLO INVERSOR NOT -->
  <image x="10" y="10" width="200" height="120" href="data:image/gif;base64,"/>
  <text x="110" y="135" fill="#64748b" font-size="11" text-anchor="middle">S = Ā (NOT A)</text>

  <!-- TABELA VERDADE -->
  <rect x="250" y="30" width="150" height="80" rx="6" fill="#111827" stroke="#1e2d40" stroke-width="1"/>
  <rect x="250" y="30" width="150" height="28" rx="6" fill="#0f172a"/>
  <rect x="250" y="50" width="150" height="8"      fill="#0f172a"/>
  <text x="295" y="49" fill="#00c2ff" font-size="11" text-anchor="middle" font-weight="600">A</text>
  <text x="375" y="49" fill="#00c2ff" font-size="11" text-anchor="middle" font-weight="600">S = Ā</text>
  <line x1="250" y1="58" x2="400" y2="58" stroke="#1e2d40" stroke-width="1"/>
  <line x1="250" y1="78" x2="400" y2="78" stroke="#1e2d40" stroke-width="1"/>
  <line x1="330" y1="30" x2="330" y2="110" stroke="#1e2d40" stroke-width="1"/>

  <text x="290" y="73" fill="#64748b" font-size="12" text-anchor="middle">0</text>
  <text x="375" y="73" fill="#00c2ff" font-size="12" text-anchor="middle">1</text>

  <text x="290" y="95" fill="#64748b" font-size="12" text-anchor="middle">1</text>
