<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace" font-size="11">
  <rect width="560" height="200" fill="#0a0e17" rx="8"/>
  <!-- nível alto e baixo -->
  <line x1="60" y1="55"  x2="520" y2="55"  stroke="#1e2d40" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="60" y1="145" x2="520" y2="145" stroke="#1e2d40" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- eixos -->
  <line x1="60" y1="30"  x2="60"  y2="165" stroke="#64748b" stroke-width="1.5"/>
  <line x1="55" y1="160" x2="525" y2="160" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="525,160 518,156 518,164" fill="#64748b"/>
  <polygon points="60,30 56,37 64,37" fill="#64748b"/>
  <text x="530" y="164" fill="#64748b" font-size="12" font-style="italic">t</text>
  <text x="52"  y="27"  fill="#64748b" font-size="12" font-style="italic">x</text>
  <!-- sinal digital: sequência 1 0 1 1 0 1 0 0 1 -->
  <polyline
    points="60,145 60,55 100,55 100,145 140,145 140,55 180,55 180,55 220,55 220,145 260,145 260,55 300,55 300,145 340,145 340,145 380,145 380,55 420,55 420,145 460,145 460,55 500,55 500,145 520,145"
    fill="none" stroke="#00c2ff" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- fill sob o sinal alto -->
  <rect x="60"  y="55" width="40"  height="90" fill="rgba(0,194,255,0.06)"/>
  <rect x="140" y="55" width="80"  height="90" fill="rgba(0,194,255,0.06)"/>
  <rect x="260" y="55" width="40"  height="90" fill="rgba(0,194,255,0.06)"/>
  <rect x="380" y="55" width="40"  height="90" fill="rgba(0,194,255,0.06)"/>
  <rect x="460" y="55" width="40"  height="90" fill="rgba(0,194,255,0.06)"/>
  <!-- bits labels -->
  <text x="72"  y="48" fill="#00c2ff" font-size="11" text-anchor="middle">1</text>
  <text x="112" y="158" fill="#64748b" font-size="11" text-anchor="middle">0</text>
  <text x="152" y="48" fill="#00c2ff" font-size="11" text-anchor="middle">1</text>
  <text x="192" y="48" fill="#00c2ff" font-size="11" text-anchor="middle">1</text>
  <text x="232" y="158" fill="#64748b" font-size="11" text-anchor="middle">0</text>
  <text x="272" y="48" fill="#00c2ff" font-size="11" text-anchor="middle">1</text>
  <text x="312" y="158" fill="#64748b" font-size="11" text-anchor="middle">0</text>
  <text x="352" y="158" fill="#64748b" font-size="11" text-anchor="middle">0</text>
  <text x="392" y="48" fill="#00c2ff" font-size="11" text-anchor="middle">1</text>
  <text x="432" y="158" fill="#64748b" font-size="11" text-anchor="middle">0</text>
  <text x="472" y="48" fill="#00c2ff" font-size="11" text-anchor="middle">1</text>
  <!-- labels nível -->
  <text x="30" y="59"  fill="#64748b" font-size="10">V_H</text>
  <text x="30" y="149" fill="#64748b" font-size="10">V_L</text>
  <text x="280" y="195" fill="#64748b" font-size="10" text-anchor="middle">Sinal digital — discreto em amplitude e no tempo, dois níveis lógicos {0,1}</text>
</svg>
